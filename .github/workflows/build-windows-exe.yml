name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      HUASHENGAI_DIST_NAME: 荷塘AI花生工具
      PLAYWRIGHT_BROWSERS_PATH: playwright-browsers
      PYWEBVIEW_TITLE: 荷塘AI花生工具

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Sync Python dependencies
        run: uv sync

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Sync frontend to desktop bundle
        shell: bash
        run: |
          mkdir -p app/web_dist
          find app/web_dist -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp -R frontend/dist/. app/web_dist/

      - name: Install Playwright Chromium
        run: uv run python -m playwright install chromium

      - name: Build EXE with PyInstaller
        run: uv run --with pyinstaller pyinstaller --noconfirm --clean pyinstaller.spec

      - name: Archive bundled app
        shell: pwsh
        run: |
          $zipPath = "dist/${env:HUASHENGAI_DIST_NAME}-windows.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "dist/${env:HUASHENGAI_DIST_NAME}" -DestinationPath $zipPath

      - name: Upload bundled directory
        uses: actions/upload-artifact@v4
        with:
          name: 荷塘AI花生工具-windows-dir
          path: dist/荷塘AI花生工具
          if-no-files-found: error

      - name: Upload zipped bundle
        uses: actions/upload-artifact@v4
        with:
          name: 荷塘AI花生工具-windows-zip
          path: dist/荷塘AI花生工具-windows.zip
          if-no-files-found: error
